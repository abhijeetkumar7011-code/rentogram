<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="50%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#FDF2F8"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- laptop base -->
  <rect x="90" y="195" width="220" height="14" rx="4" fill="#CBD5E1"/>
  <polygon points="95,195 305,195 290,205 110,205" fill="#E2E8F0"/>
  <!-- screen body -->
  <rect x="120" y="80" width="160" height="115" rx="8" fill="#94A3B8"/>
  <rect x="128" y="88" width="144" height="99" rx="4" fill="url(#screen)"/>
  <!-- screen details -->
  <circle cx="200" cy="130" r="18" fill="white" opacity="0.25"/>
  <rect x="140" y="155" width="120" height="6" rx="3" fill="white" opacity="0.4"/>
  <rect x="140" y="167" width="80" height="6" rx="3" fill="white" opacity="0.3"/>
</svg>
