<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="50%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#FDF2F8"/>
    </linearGradient>
    <linearGradient id="screen2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)"/>
  <!-- monitor stand -->
  <rect x="185" y="195" width="30" height="35" rx="3" fill="#94A3B8"/>
  <rect x="150" y="228" width="100" height="10" rx="4" fill="#CBD5E1"/>
  <!-- monitor frame -->
  <rect x="80" y="60" width="240" height="140" rx="10" fill="#94A3B8"/>
  <rect x="92" y="72" width="216" height="116" rx="5" fill="url(#screen2)"/>
  <!-- screen details -->
  <rect x="110" y="95" width="90" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="110" y="112" width="140" height="8" rx="4" fill="white" opacity="0.3"/>
  <circle cx="260" cy="150" r="20" fill="white" opacity="0.2"/>
</svg>
