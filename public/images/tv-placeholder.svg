<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="50%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#FDF2F8"/>
    </linearGradient>
    <linearGradient id="screenT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgT)"/>
  <!-- TV stand -->
  <rect x="175" y="205" width="50" height="8" rx="3" fill="#94A3B8"/>
  <rect x="195" y="195" width="10" height="14" fill="#94A3B8"/>
  <!-- TV frame -->
  <rect x="55" y="55" width="290" height="150" rx="10" fill="#475569"/>
  <rect x="67" y="67" width="266" height="126" rx="5" fill="url(#screenT)"/>
  <!-- screen content -->
  <rect x="90" y="90" width="100" height="10" rx="5" fill="white" opacity="0.4"/>
  <rect x="90" y="108" width="160" height="8" rx="4" fill="white" opacity="0.3"/>
  <circle cx="280" cy="140" r="24" fill="white" opacity="0.2"/>
</svg>
